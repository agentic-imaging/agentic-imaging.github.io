<svg viewBox="0 0 720 250" role="img" aria-labelledby="arch-t arch-d" xmlns="http://www.w3.org/2000/svg">
<title id="arch-t">AgX pipeline and trust boundaries</title>
<desc id="arch-d">A human poses a task; an agent plans it; agents with skills run it; verifiers check it; artifacts and provenance record it; a human gate approves any claim before it is published.</desc>
<g font-family="sans-serif" font-size="13" text-anchor="middle">
<rect x="10" y="95" width="90" height="46" rx="6" fill="#8ab4f822" stroke="#8ab4f8"/><text x="55" y="115">Human</text><text x="55" y="131" font-size="10">poses task</text>
<rect x="130" y="95" width="90" height="46" rx="6" fill="#0b57d022" stroke="#0b57d0"/><text x="175" y="115">Plan</text><text x="175" y="131" font-size="10">agent</text>
<rect x="250" y="95" width="90" height="46" rx="6" fill="#0b57d022" stroke="#0b57d0"/><text x="295" y="115">Run</text><text x="295" y="131" font-size="10">agents+skills</text>
<rect x="370" y="95" width="90" height="46" rx="6" fill="#0b57d022" stroke="#0b57d0"/><text x="415" y="115">Verify</text><text x="415" y="131" font-size="10">verifiers</text>
<rect x="490" y="95" width="100" height="46" rx="6" fill="#5c5c5c22" stroke="#888888"/><text x="540" y="115">Report</text><text x="540" y="131" font-size="10">artifacts+prov.</text>
<rect x="620" y="95" width="90" height="46" rx="6" fill="#8ab4f822" stroke="#8ab4f8"/><text x="665" y="112">Human</text><text x="665" y="127" font-size="10">gate: claim</text><text x="665" y="139" font-size="10">/publish</text>
<g stroke="#888888" stroke-width="1.5" fill="none" marker-end="url(#a)"><path d="M100 118 H128"/><path d="M220 118 H248"/><path d="M340 118 H368"/><path d="M460 118 H488"/><path d="M590 118 H618"/><path d="M415 95 C415 55 295 55 295 93" stroke-dasharray="4 3"/></g>
<text x="355" y="48" font-size="10" fill="#888888">verify fails &#8594; re-plan/re-run</text>
<defs><marker id="a" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0 0 L7 3.5 L0 7 z" fill="#888888"/></marker></defs>
</g>
</svg>
